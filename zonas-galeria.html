<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Zonas Galería | AgriCheck</title>
  <meta name="description" content="Galería de vendedores por zona de AgriCheck, con contactos filtrados y acceso rápido a WhatsApp." />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #0b1f3f;
      --bg-2: #08162d;
      --card: #0e1b2a;
      --line: #223046;
      --text: #f8fafc;
      --muted: #c9d3dd;
      --accent: #2aa66a;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Lato", system-ui, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 15% 20%, #143067 0%, var(--bg-1) 45%, var(--bg-2) 100%);
    }

    a { color: inherit; text-decoration: none; }

    header {
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,.12);
      background: rgba(8, 20, 42, .7);
      backdrop-filter: blur(8px);
    }

    .container { width: min(1120px, 100% - 24px); margin: 0 auto; }
    .topbar { display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .brandLogo { background: rgba(255,255,255,.18); border-radius: 999px; padding: 8px 14px; border:1px solid rgba(255,255,255,.24); }
    .brandLogo img { height: 40px; display: block; }
    .navlinks { display:flex; gap:8px; flex-wrap:wrap; }
    .navlinks a { padding: 10px 14px; border-radius: 999px; background: rgba(255,255,255,.1); font-weight: 700; }

    main { padding: 24px 0 36px; }
    .hero {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--card);
      box-shadow: 0 16px 34px rgba(0,0,0,.32);
      padding: 22px;
      margin-bottom: 18px;
    }

    .hero h1 { margin: 0 0 8px; font-size: clamp(28px, 4vw, 38px); }
    .hero p { margin: 0; color: var(--muted); }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(300px, .9fr);
      gap: 16px;
      align-items: start;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--card);
      box-shadow: 0 16px 34px rgba(0,0,0,.3);
      padding: 18px;
    }

    .galleryFrame {
      position: relative;
      min-height: 430px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.1);
      background: #10253f;
    }

    .galleryTrack {
      display: flex;
      width: 100%;
      transition: transform .45s ease;
      will-change: transform;
    }

    .slide {
      flex: 0 0 100%;
      padding: 16px;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 12px;
      cursor: pointer;
    }

    .slide img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.15);
      background: #0f172a;
    }

    .slideMeta h3 { margin: 0; font-size: 24px; }
    .slideMeta p { margin: 4px 0 0; color: var(--muted); }

    .controls {
      position: absolute;
      inset: auto 0 16px;
      z-index: 3;
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .controls button,
    .allBtn,
    .waBtn {
      border: 1px solid rgba(255,255,255,.2);
      background: rgba(2, 8, 20, .75);
      color: #fff;
      padding: 10px 12px;
      border-radius: 999px;
      font-weight: 700;
      cursor: pointer;
    }

    .contactsTitle {
      margin: 0 0 10px;
      font-size: 20px;
    }

    .contactItem {
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      background: rgba(255,255,255,.03);
    }

    .contactItem p { margin: 4px 0; }
    .contactItem small { color: var(--muted); }
    .waBtn { display: inline-block; margin-top: 8px; background: rgba(42,166,106,.2); border-color: rgba(42,166,106,.5); }

    .allBtn { width: 100%; margin-bottom: 12px; }

    @media (max-width: 920px) {
      .layout { grid-template-columns: 1fr; }
      .galleryFrame { min-height: 390px; }
      .slide img { height: 250px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container topbar">
      <a class="brandLogo" href="index.html" aria-label="AgriCheck inicio">
        <img src="agrichecklogo.png" alt="AgriCheck" />
      </a>
      <nav class="navlinks" aria-label="Navegación principal">
        <a href="index.html">Inicio</a>
        <a href="Zonas.html">Mapa de Zonas</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>Galería de vendedores por zona</h1>
      <p>Esta versión reemplaza el mapa de fondo por una galería. Navegá hacia los lados para ver cada vendedor y filtrar sus datos de contacto.</p>
    </section>

    <section class="layout">
      <article class="card">
        <div id="gallery" class="galleryFrame">
          <div id="galleryTrack" class="galleryTrack"></div>
        </div>
        <div class="controls">
          <button id="prevBtn" aria-label="Anterior">◀ Anterior</button>
          <button id="nextBtn" aria-label="Siguiente">Siguiente ▶</button>
        </div>
      </article>

      <aside class="card">
        <button id="showAllContacts" class="allBtn">Mostrar todos los contactos</button>
        <h2 id="contactsTitle" class="contactsTitle">Contactos filtrados</h2>
        <div id="contacts"></div>
      </aside>
    </section>
  </main>

  <script>
    const sellers = [
      {
        key: "Marcelo Lizondo",
        displayName: "Marcelo Lizondo",
        meta: "RTV NOA",
        img: "Marcelo Lizondo. RTV NOA.webp",
        contacts: [{ name: "Marcelo Lizondo", phone: "5493816083328", email: "marcelo.lizondo@agrichecksrl.com" }]
      },
      {
        key: "Alan Schmidt",
        displayName: "Alan Schmidt",
        meta: "RTV Litoral",
        img: "Alan Schmidt. RTV Litoral.webp",
        contacts: [{ name: "Alan Schmidt", phone: "5493455235949", email: "alan.schmidt@agrichecksrl.com" }]
      },
      {
        key: "Miguel Utrera",
        displayName: "Miguel Utrera",
        meta: "RTV Núcleo Centro",
        img: "Miguel Utrera. RTV Nucleo centro.webp",
        contacts: [{ name: "Miguel Utrera", phone: "549372515563", email: "miguel.utrera@agrichecksrl.com" }]
      },
      {
        key: "Evelyn Riveros y Daiana González",
        displayName: "Evelyn Riveros y Daiana González",
        meta: "RTV Cuyo",
        img: "Daiana González. RTV Cuyo.webp",
        contacts: [
          { name: "Evelyn Riveros", phone: "5492616076080", email: "evelyn.riveros@agrichecksrl.com", legend: "Frutales" },
          { name: "Daiana González", phone: "5492617648050", email: "daiana.gonzalez@agrichecksrl.com", legend: "Hortícolas y Otros" }
        ]
      },
      {
        key: "Andrés Perez",
        displayName: "Andrés Perez",
        meta: "RTV Buenos Aires",
        img: "Andres.jpg",
        contacts: [{ name: "Andrés Perez", phone: "5492494511210", email: "andres.perez@agrichecksrl.com" }]
      },
      {
        key: "Victoria Vianna",
        displayName: "Victoria Vianna",
        meta: "RTV Oeste de Valle R.N y Nqn",
        img: "Victoria Vianna.webp",
        contacts: [{ name: "Victoria Vianna", phone: "5492984308032", email: "victoria.vianna@agrichecksrl.com" }]
      },
      {
        key: "Aníbal Epullán",
        displayName: "Aníbal Epullán",
        meta: "RTV Este de Alto Valle",
        img: "Anibal Epullán. RTV Este de Alto Valle.webp",
        contacts: [{ name: "Aníbal Epullán", phone: "5492984309419", email: "anibal.epullan@agrichecksrl.com" }]
      }
    ];

    const gallery = document.getElementById("gallery");
    const galleryTrack = document.getElementById("galleryTrack");
    const contacts = document.getElementById("contacts");
    const contactsTitle = document.getElementById("contactsTitle");
    const showAllContacts = document.getElementById("showAllContacts");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    let current = 0;
    let autoMove;

    function formatPhone(raw = "") {
      return raw ? `+${raw.slice(0, 2)} ${raw.slice(2, 3)} ${raw.slice(3, 7)} ${raw.slice(7)}` : "Sin teléfono";
    }

    function renderContacts(sellerIndex = null) {
      contacts.innerHTML = "";
      const source = sellerIndex === null ? sellers.flatMap((s) => s.contacts.map((c) => ({...c, zone: s.meta}))) : sellers[sellerIndex].contacts.map((c) => ({...c, zone: sellers[sellerIndex].meta}));

      contactsTitle.textContent = sellerIndex === null ? "Todos los contactos" : `Contacto de ${sellers[sellerIndex].displayName}`;

      source.forEach((contact) => {
        const card = document.createElement("article");
        card.className = "contactItem";
        card.innerHTML = `
          <p><strong>${contact.name}</strong></p>
          ${contact.legend ? `<small>${contact.legend}</small>` : ""}
          <p>${contact.zone}</p>
          <p>${formatPhone(contact.phone)}</p>
          <p><a href="mailto:${contact.email}">${contact.email}</a></p>
          <a class="waBtn" href="https://wa.me/${contact.phone}" target="_blank" rel="noopener noreferrer">WhatsApp</a>
        `;
        contacts.appendChild(card);
      });
    }

    function renderSlides() {
      galleryTrack.style.transform = `translateX(-${current * 100}%)`;
      renderContacts(current);
    }

    function goTo(step = 1) {
      current = (current + step + sellers.length) % sellers.length;
      renderSlides();
    }

    function mountGallery() {
      sellers.forEach((seller) => {
        const slide = document.createElement("article");
        slide.className = "slide";
        slide.innerHTML = `
          <img src="${seller.img}" alt="${seller.displayName}" loading="lazy" />
          <div class="slideMeta">
            <h3>${seller.displayName}</h3>
            <p>${seller.meta}</p>
          </div>
        `;
        slide.addEventListener("click", () => renderContacts(sellers.findIndex((s) => s.key === seller.key)));
        galleryTrack.appendChild(slide);
      });

      renderSlides();
    }

    function restartAutoMove() {
      clearInterval(autoMove);
      autoMove = setInterval(() => goTo(1), 5000);
    }

    prevBtn.addEventListener("click", () => {
      goTo(-1);
      restartAutoMove();
    });

    nextBtn.addEventListener("click", () => {
      goTo(1);
      restartAutoMove();
    });

    showAllContacts.addEventListener("click", () => renderContacts(null));

    let touchStartX = 0;
    let touchEndX = 0;

    gallery.addEventListener("touchstart", (event) => {
      touchStartX = event.changedTouches[0].screenX;
    }, { passive: true });

    gallery.addEventListener("touchend", (event) => {
      touchEndX = event.changedTouches[0].screenX;
      const swipeDistance = touchEndX - touchStartX;

      if (Math.abs(swipeDistance) < 40) return;
      if (swipeDistance > 0) goTo(-1);
      else goTo(1);
      restartAutoMove();
    }, { passive: true });

    mountGallery();
    restartAutoMove();
  </script>
</body>
</html>
